<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperMini Air Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .metric-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s ease-in-out;
        }
        .metric-card:hover {
            border-color: #475569;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="h-3 w-3 rounded-full bg-red-500 animate-pulse" id="status-dot"></div>
            <h1 class="text-xl font-bold tracking-tight">SuperMini Air Monitor</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="btn-connect" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-4 py-2 rounded-lg text-sm transition shadow-lg shadow-blue-600/20 cursor-pointer">
                Connect Device
            </button>
            <button id="btn-export" disabled class="bg-slate-800 text-slate-400 font-medium px-4 py-2 rounded-lg text-sm transition cursor-not-allowed opacity-50">
                Export CSV (<span id="log-count">0</span>)
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="metric-card rounded-2xl p-6 relative overflow-hidden">
                <div class="text-xs font-semibold tracking-wider text-orange-400 uppercase">Carbon Dioxide</div>
                <div class="flex items-baseline gap-2 mt-4">
                    <span id="val-co2" class="text-6xl font-black tracking-tight text-white">---</span>
                    <span class="text-slate-400 font-medium text-lg">PPM</span>
                </div>
                <div id="badge-co2" class="absolute top-6 right-6 px-2.5 py-1 text-xs font-bold rounded-full bg-slate-800 text-slate-400">
                    Offline
                </div>
            </div>

            <div class="metric-card rounded-2xl p-6 relative overflow-hidden">
                <div class="text-xs font-semibold tracking-wider text-red-400 uppercase">Formaldehyde (HCHO)</div>
                <div class="flex items-baseline gap-2 mt-4">
                    <span id="val-hcho" class="text-6xl font-black tracking-tight text-white">---</span>
                    <span class="text-slate-400 font-medium text-lg">PPB</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="metric-card rounded-xl p-4">
                <div class="text-xs font-medium text-cyan-400">PM 1.0</div>
                <div class="text-2xl font-bold mt-1"><span id="val-pm1">---</span> <span class="text-xs text-slate-500 font-normal">µg/m³</span></div>
            </div>
            <div class="metric-card rounded-xl p-4">
                <div class="text-xs font-medium text-cyan-400">PM 2.5</div>
                <div class="text-2xl font-bold mt-1"><span id="val-pm25">---</span> <span class="text-xs text-slate-500 font-normal">µg/m³</span></div>
            </div>
            <div class="metric-card rounded-xl p-4">
                <div class="text-xs font-medium text-cyan-400">PM 4.0</div>
                <div class="text-2xl font-bold mt-1"><span id="val-pm4">---</span> <span class="text-xs text-slate-500 font-normal">µg/m³</span></div>
            </div>
            <div class="metric-card rounded-xl p-4">
                <div class="text-xs font-medium text-cyan-400">PM 10.0</div>
                <div class="text-2xl font-bold mt-1"><span id="val-pm10">---</span> <span class="text-xs text-slate-500 font-normal">µg/m³</span></div>
            </div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="metric-card rounded-xl p-4">
                <div class="text-xs font-medium text-purple-400">VOC Index</div>
                <div class="text-2xl font-bold mt-1" id="val-voc">---</div>
            </div>
            <div class="metric-card rounded-xl p-4">
                <div class="text-xs font-medium text-purple-400">NOx Index</div>
                <div class="text-2xl font-bold mt-1" id="val-nox">---</div>
            </div>
            <div class="metric-card rounded-xl p-4">
                <div class="text-xs font-medium text-green-400">Temperature</div>
                <div class="text-2xl font-bold mt-1"><span id="val-temp">---</span> <span class="text-sm text-slate-500 font-normal">°C</span></div>
            </div>
            <div class="metric-card rounded-xl p-4">
                <div class="text-xs font-medium text-green-400">Humidity</div>
                <div class="text-2xl font-bold mt-1"><span id="val-hum">---</span> <span class="text-sm text-slate-500 font-normal">%</span></div>
            </div>
        </div>

    </main>

    <script>
        // Nordic UART Service UUID definitions
        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHAR_UUID      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let bluetoothDevice = null;
        let txCharacteristic = null;
        let dataBuffer = "";
        
        // CSV In-Memory Logging Array
        const csvRecords = [];

        // UI Element Selectors
        const btnConnect = document.getElementById('btn-connect');
        const btnExport  = document.getElementById('btn-export');
        const logCount   = document.getElementById('log-count');
        const statusDot  = document.getElementById('status-dot');

        // Target Value Containers
        const fields = {
            pm1:  document.getElementById('val-pm1'),
            pm25: document.getElementById('val-pm25'),
            pm4:  document.getElementById('val-pm4'),
            pm10: document.getElementById('val-pm10'),
            hum:  document.getElementById('val-hum'),
            temp: document.getElementById('val-temp'),
            voc:  document.getElementById('val-voc'),
            nox:  document.getElementById('val-nox'),
            hcho: document.getElementById('val-hcho'),
            co2:  document.getElementById('val-co2')
        };
        const badgeCo2 = document.getElementById('badge-co2');

        // Connect/Disconnect Toggle Event Handler
        btnConnect.addEventListener('click', () => {
            if (!bluetoothDevice) {
                initiateBleConnection();
            } else {
                terminateBleConnection();
            }
        });

        // Export Data Log Event Handler
        btnExport.addEventListener('click', generateCsvDownload);

        async function initiateBleConnection() {
            try {
                statusDot.className = "h-3 w-3 rounded-full bg-amber-500 animate-pulse";
                btnConnect.textContent = "Searching...";

                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'SuperMini Air Monitor' }],
                    optionalServices: [UART_SERVICE_UUID]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDeviceDisconnected);
                
                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                txCharacteristic = await service.getCharacteristic(TX_CHAR_UUID);
                
                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleIncomingData);

                // Update UI state to Connected
                statusDot.className = "h-3 w-3 rounded-full bg-green-500";
                btnConnect.className = "bg-red-600 hover:bg-red-500 text-white font-medium px-4 py-2 rounded-lg text-sm transition cursor-pointer";
                btnConnect.textContent = "Disconnect";
                badgeCo2.className = "absolute top-6 right-6 px-2.5 py-1 text-xs font-bold rounded-full bg-green-950 text-green-400";
                badgeCo2.textContent = "Normal";

            } catch (error) {
                console.error("BLE Connection Failed:", error);
                terminateBleConnection();
            }
        }

        function terminateBleConnection() {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            } else {
                onDeviceDisconnected();
            }
        }

        function onDeviceDisconnected() {
            bluetoothDevice = null;
            txCharacteristic = null;
            dataBuffer = "";
            
            // Reset UI state to Disconnected
            statusDot.className = "h-3 w-3 rounded-full bg-red-500 animate-pulse";
            btnConnect.className = "bg-blue-600 hover:bg-blue-500 text-white font-medium px-4 py-2 rounded-lg text-sm transition shadow-lg shadow-blue-600/20 cursor-pointer";
            btnConnect.textContent = "Connect Device";
            badgeCo2.className = "absolute top-6 right-6 px-2.5 py-1 text-xs font-bold rounded-full bg-slate-800 text-slate-400";
            badgeCo2.textContent = "Offline";
            
            // Clear current reading values on screen
            Object.values(fields).forEach(el => el.textContent = "---");
        }

        // Handles chunked MTU packet data reconstruction
        function handleIncomingData(event) {
            const decoder = new TextDecoder();
            dataBuffer += decoder.decode(event.target.value);

            // Process every complete newline string found in data block
            let newlineIndex;
            while ((newlineIndex = dataBuffer.indexOf('\n')) >= 0) {
                const completeLine = dataBuffer.substring(0, newlineIndex).trim();
                dataBuffer = dataBuffer.substring(newlineIndex + 1);
                
                if (completeLine.length > 0) {
                    parseDataPayload(completeLine);
                }
            }
        }

        // Parses incoming CSV string row to variables
        function parseDataPayload(csvLine) {
            // Layout structure parsed: pm1,pm25,pm4,pm10,humidity,temperature,vocIndex,noxIndex,hcho,co2
            const tokens = csvLine.split(',');
            if (tokens.length < 10) return; // Drop corrupted packets

            const data = {
                timestamp: new Date().toISOString(),
                pm1:  parseFloat(tokens[0]).toFixed(1),
                pm25: parseFloat(tokens[1]).toFixed(1),
                pm4:  parseFloat(tokens[2]).toFixed(1),
                pm10: parseFloat(tokens[3]).toFixed(1),
                hum:  parseFloat(tokens[4]).toFixed(0),
                temp: parseFloat(tokens[5]).toFixed(1),
                voc:  parseInt(tokens[6]),
                nox:  parseInt(tokens[7]),
                hcho: parseFloat(tokens[8]).toFixed(2),
                co2:  parseInt(tokens[9])
            };

            updateDashboardUI(data);
            logRecordToMemory(data);
        }

        function updateDashboardUI(data) {
            // Populate value nodes dynamically
            fields.pm1.textContent  = data.pm1;
            fields.pm25.textContent = data.pm25;
            fields.pm4.textContent  = data.pm4;
            fields.pm10.textContent = data.pm10;
            fields.hum.textContent  = data.hum;
            fields.temp.textContent = data.temp;
            fields.voc.textContent  = data.voc;
            fields.nox.textContent  = data.nox;
            fields.hcho.textContent = data.hcho;
            fields.co2.textContent  = data.co2;

            // Threshold checking alert badge engine for CO2 tracks
            if (data.co2 > 1000) {
                badgeCo2.className = "absolute top-6 right-6 px-2.5 py-1 text-xs font-bold rounded-full bg-red-950 text-red-400 animate-bounce";
                badgeCo2.textContent = "High Warning";
            } else {
                badgeCo2.className = "absolute top-6 right-6 px-2.5 py-1 text-xs font-bold rounded-full bg-green-950 text-green-400";
                badgeCo2.textContent = "Normal";
            }
        }

        function logRecordToMemory(data) {
            csvRecords.push(data);
            logCount.textContent = csvRecords.length;

            // Enable export interaction once data exists
            if (csvRecords.length === 1) {
                btnExport.disabled = false;
                btnExport.className = "bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-4 py-2 rounded-lg text-sm transition shadow-lg shadow-emerald-600/20 cursor-pointer";
            }
        }

        function generateCsvDownload() {
            if (csvRecords.length === 0) return;

            // Construct standard data row lines string arrays
            const headers = ["Timestamp", "PM1.0 (ug/m3)", "PM2.5 (ug/m3)", "PM4.0 (ug/m3)", "PM10.0 (ug/m3)", "Humidity (%)", "Temperature (C)", "VOC Index", "NOx Index", "HCHO (ppb)", "CO2 (ppm)"];
            const rows = csvRecords.map(r => [
                r.timestamp, r.pm1, r.pm25, r.pm4, r.pm10, r.hum, r.temp, r.voc, r.nox, r.hcho, r.co2
            ]);

            const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
            
            // Generate temporary virtual trigger link pipeline to initialize download task
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            const timestampStr = new Date().toISOString().replace(/[:.]/g, "-").substring(0, 19);
            link.setAttribute("href", url);
            link.setAttribute("download", `air_monitor_log_${timestampStr}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
